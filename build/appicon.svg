<?xml version="1.0" encoding="UTF-8"?>
<!--
  localClaudeCodeProxy 应用图标
  设计语义：
    - 圆角方形深色底（#0F1117，与应用 BackgroundColour 一致）
    - Claude 橙色（#D97757）盾牌轮廓 = "保护 / 受信凭证"
    - 盾内双向箭头 + 中心节点 = "本地代理 / 双向转发"
    - 简洁几何，可缩到 16x16 托盘
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1F2E"/>
      <stop offset="100%" stop-color="#0F1117"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E89070"/>
      <stop offset="100%" stop-color="#D97757"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F4B89A"/>
      <stop offset="100%" stop-color="#D97757"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 圆角方形底 -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- 内描边，提升质感 -->
  <rect x="8" y="8" width="1008" height="1008" rx="214" ry="214"
        fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="2"/>

  <!-- 盾牌主体：从顶部居中向下，带一定收腰 -->
  <g filter="url(#softGlow)">
    <path d="M 512 168
             L 800 256
             L 800 512
             C 800 680 680 800 512 856
             C 344 800 224 680 224 512
             L 224 256
             Z"
          fill="none"
          stroke="url(#shieldGrad)"
          stroke-width="36"
          stroke-linejoin="round"
          stroke-linecap="round"/>
  </g>

  <!-- 盾内：代码括号 < > + 中心节点 = "代码 + 代理转发" 语义 -->
  <g stroke="url(#arrowGrad)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- 左括号 -->
    <polyline points="420,420 320,525 420,630"/>
    <!-- 右括号 -->
    <polyline points="604,420 704,525 604,630"/>
  </g>

  <!-- 中心节点：双层圆，表达"本地代理服务正在运行" -->
  <circle cx="512" cy="525" r="42" fill="#0F1117"/>
  <circle cx="512" cy="525" r="36" fill="none" stroke="#F4B89A" stroke-width="8"/>
  <circle cx="512" cy="525" r="16" fill="#F4B89A"/>
</svg>
